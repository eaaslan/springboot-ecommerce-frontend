server {
    listen 80;
    server_name _;

    # Use the embedded Docker DNS (127.0.0.11) so the api-gateway hostname is
    # re-resolved on the fly. Without this, nginx caches the upstream's IP at
    # startup and a 'docker compose up --build api-gateway' (which gives the
    # gateway a new container IP) leaves the frontend pointing at a dead IP
    # and every /api/* call fails with 502 'Host is unreachable'.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # gzip the static bundle
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — every non-asset path resolves to index.html so
    # React Router's client-side routes (e.g. /products/42) work on direct hits.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Long-cache static assets emitted by Vite (hashed filenames)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API + actuator + sse(MCP) to api-gateway in the same docker network.
    # Browser hits same origin → no CORS, JWT cookie/header flows through.
    # The variable-based proxy_pass forces nginx to re-resolve the hostname
    # via Docker DNS on each request instead of caching at startup.
    location /api/ {
        set $api_upstream http://api-gateway:8080;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # MCP server (Spring AI SSE endpoint)
    location /sse {
        set $sse_upstream http://api-gateway:8080;
        proxy_pass $sse_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 24h;
    }

    # Don't leak nginx version
    server_tokens off;
}
